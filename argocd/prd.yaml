apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webapp-prd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/satyamguharoy/argocd-nginx-demo.git
    targetRevision: main
    path: overlays/prd
  destination:
    server: https://kubernetes.default.svc
    namespace: webapp-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
