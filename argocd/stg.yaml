apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webapp-stg
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/satyamguharoy/argocd-nginx-demo.git
    targetRevision: main
    path: overlays/stg
  destination:
    server: https://kubernetes.default.svc
    namespace: webapp-stg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
