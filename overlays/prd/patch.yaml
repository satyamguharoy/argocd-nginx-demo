apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
spec:
  replicas: 5
  template:
    spec:
      containers:
        - name: webapp
          image: nginx:1.27
          env:
            - name: LOG_LEVEL
              value: warn
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"