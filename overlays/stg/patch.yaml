apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: webapp
          image: nginx:1.26
          env:
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"